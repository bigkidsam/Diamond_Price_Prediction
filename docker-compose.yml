version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15
    container_name: diamond-db
    environment:
      POSTGRES_USER: diamond_user
      POSTGRES_PASSWORD: diamond_password
      POSTGRES_DB: diamond_predictor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diamond_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: diamond-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://diamond_user:diamond_password@db:5432/diamond_predictor
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./diamond_price_model.pkl:/app/diamond_price_model.pkl
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  # Nginx (Optional - for serving frontend and reverse proxy)
  nginx:
    image: nginx:alpine
    container_name: diamond-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - default

volumes:
  postgres_data:

networks:
  default:
    driver: bridge
